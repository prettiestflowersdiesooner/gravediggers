<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <title>gravedigger</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: black;
      color: white;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }
    h1 {
      font-size: 3em;
      font-weight: 200; /* thin weight */
      letter-spacing: 1px;
    }
    p {
      font-size: 1.2em;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>gravedigger</h1>
  <p>2027</p>
</body>
</html>
<!-- Shovel emoji button triggers audio -->
<button onclick="fadeOutButton()" class="emoji-button" id="shovelButton">
  ❤︎
</button>

<!-- Audio file -->
<audio id="Taudio" loop>
  <source src="T.mp3" type="audio/mpeg">
</audio>

<style>
  .emoji-button {
    background: none;   /* remove white box */
    border: none;       /* no border */
    font-size: 3em;     /* big emoji */
    cursor: pointer;    /* pointer on hover */
    color: white;       /* emoji color */
    transition: opacity 1s ease; /* smooth fade */
  }
  .emoji-button:focus {
    outline: none;      /* remove focus outline */
  }
  .emoji-button:hover {
    opacity: 0.7;       /* subtle hover effect */
  }
</style>

<script>
  function fadeOutButton() {
    const btn = document.getElementById('shovelButton');
    const audio = document.getElementById('Taudio');
    audio.play();
    btn.style.opacity = '0';       // fade out
    setTimeout(() => btn.style.display = 'none', 1000); // hide after fade
  }
</script>
